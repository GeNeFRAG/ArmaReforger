# Nginx configuration for Single Page Application
# Handles routing, caching, compression, and SEO best practices

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Cache control for assets (fingerprinted or versioned)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache control for JSON data files
    location ~* \.json$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Don't cache index.html, robots.txt, sitemap.xml
    location ~* ^/(index\.html|robots\.txt|sitemap\.xml)$ {
        expires off;
        add_header Cache-Control "public, must-revalidate, max-age=0";
    }

    # Serve robots.txt and sitemap.xml at root
    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    # SPA Routing: Rewrite all non-file requests to index.html
    # This allows the SPA to handle its own routing via URL hashes
    location / {
        # First try to serve the file as-is (static assets)
        try_files $uri $uri/ /index.html;

        # Make sure index.html itself doesn't get cached aggressively
        add_header Cache-Control "public, must-revalidate, max-age=0";
    }

    # Deny access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error handling
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
